name: test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Generate language bindings
        run: |
          python3 scripts/checkout.py install
          python3 scripts/generate.py

      - name: Upload language bindings
        uses: actions/upload-artifact@v4
        with:
          name: language-bindings
          path: src/languages/

  test:
    needs: generate
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    steps:
      - name: Cache git
        uses: actions/cache@v4
        with:
          path: .git
          key: git-${{ github.sha }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install MoonBit (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install MoonBit (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Inspect MoonBit version
        run: |
          moon version --all
          moonrun --version

      - name: Update mooncakes.io index
        run: moon update

      - name: Setup MSVC
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download language bindings
        uses: actions/download-artifact@v4
        with:
          name: language-bindings
          path: src/languages

      - name: Run tests
        run: |
          python3 scripts/test.py
